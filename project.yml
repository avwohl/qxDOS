name: qxDOS
options:
  bundleIdPrefix: com.awohl
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
settings:
  base:
    CLANG_CXX_LANGUAGE_STANDARD: c++20
    SUPPORTS_MACCATALYST: YES
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"
targets:
  qxDOS:
    type: application
    platform: iOS
    sources:
      - path: qxDOS
      - path: emu88
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    entitlements:
      path: qxDOS/qxDOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_NAME: qxDOS
        SWIFT_OBJC_BRIDGING_HEADER: qxDOS/qxDOS-Bridging-Header.h
        GCC_PREPROCESSOR_DEFINITIONS:
          - QXDOS_VERSION="\"v$(MARKETING_VERSION) ($(CURRENT_PROJECT_VERSION))\""
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/dosbox-ios
          - $(SRCROOT)/dosbox-ios/libslirp
          - $(SRCROOT)/qxDOS/Bridge
          - $(SRCROOT)/emu88
        LIBRARY_SEARCH_PATHS: $(inherited)
        OTHER_LDFLAGS:
          - -ldosbox-bridge
          - -ldosbox-core
          - -ldecoders
          - -lloguru
          - -lnuked
          - -lesfmu
          - -lresidfp
          - -ltalchorus
          - -lwhereami
          - -lym7128b
          - -lzmbv
          - -lSDL2
          - -lSDL2main
          - -lSDL2_image
          - -lspeexdsp
          - -lz
          - -framework CoreAudio
          - -framework AudioToolbox
          - -framework CoreFoundation
          - -framework CoreVideo
          - -framework AVFoundation
          - -framework CoreBluetooth
          - -framework CoreGraphics
          - -framework CoreMotion
          - -framework Foundation
          - -framework Metal
          - -framework QuartzCore
          - -framework UIKit
          - -weak_framework GameController
          - -weak_framework CoreHaptics
          - -lresolv
        "OTHER_LDFLAGS[sdk=iphoneos*]":
          - $(inherited)
          - -liir_static
          - -lpng16
          - -lopusfile
          - -lopus
          - -logg
        "OTHER_LDFLAGS[sdk=macosx*]":
          - $(inherited)
          - -liir1
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: 34
        PRODUCT_BUNDLE_IDENTIFIER: com.awohl.qxDOS
        INFOPLIST_KEY_CFBundleDisplayName: qxDOS
        INFOPLIST_KEY_CFBundleName: qxDOS
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "qxDOS uses Bluetooth to connect game controllers and keyboards."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: ZIPFoundation
    preBuildScripts:
      - name: Build DOSBox Core
        script: |
          set -e
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          JOBS=$(sysctl -n hw.ncpu)

          if [ "$PLATFORM_NAME" = "macosx" ] || [ "$IS_MACCATALYST" = "YES" ]; then
            # Mac Catalyst: build both architectures and lipo
            ARM64_DIR="${SRCROOT}/build-maccatalyst-arm64"
            X86_DIR="${SRCROOT}/build-maccatalyst-x86_64"
            UNIVERSAL_DIR="${SRCROOT}/build-maccatalyst"

            if [ ! -f "$ARM64_DIR/CMakeCache.txt" ] || [ ! -f "$X86_DIR/CMakeCache.txt" ]; then
              echo "error: Run scripts/build_maccatalyst_universal.sh first to configure both architectures."
              exit 1
            fi

            cmake --build "$ARM64_DIR" -j"$JOBS" --target dosbox-core dosbox-bridge 2>&1
            cmake --build "$X86_DIR"   -j"$JOBS" --target dosbox-core dosbox-bridge 2>&1

            mkdir -p "$UNIVERSAL_DIR"
            for lib in "$ARM64_DIR"/*.a; do
              name=$(basename "$lib")
              x86_lib="$X86_DIR/$name"
              if [ -f "$x86_lib" ]; then
                lipo -create "$lib" "$x86_lib" -output "$UNIVERSAL_DIR/$name"
              else
                cp "$lib" "$UNIVERSAL_DIR/$name"
              fi
            done
          else
            # iOS device
            BUILD_DIR="${SRCROOT}/build-ios"
            if [ ! -f "$BUILD_DIR/CMakeCache.txt" ]; then
              echo "error: CMake not configured. Run cmake in $BUILD_DIR first (see README)."
              exit 1
            fi
            cmake --build "$BUILD_DIR" -j"$JOBS" --target dosbox-core dosbox-bridge 2>&1
          fi
        basedOnDependencyAnalysis: false
        showEnvVars: false
